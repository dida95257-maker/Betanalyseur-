<script>
var M=[], CF='all';

function ss(msg,load){
  document.getElementById('st').innerHTML = load
    ? '<div class="spin"></div><span>'+msg+'</span>'
    : '<span>'+msg+'</span>';
}

function sp(pct,txt){
  var w=document.getElementById('pw');
  w.style.display='block';
  document.getElementById('pf').style.width=pct+'%';
  document.getElementById('pp').textContent=pct+'%';
  document.getElementById('pt').textContent=txt;
  if(pct>=100) setTimeout(function(){w.style.display='none';},2000);
}

// ═══════════════════════════════════════
// MOTEUR DE PREDICTION PROFESSIONNEL
// Basé sur les mêmes modèles que les vrais bookmakers
// ═══════════════════════════════════════
function predict(m) {
  var h = m.odds.h, x = m.odds.x, a = m.odds.a;
  var hasX = x && x > 1;

  // 1. Calcul probabilités implicites brutes
  var sumRaw = 1/h + (hasX ? 1/x : 0) + 1/a;
  var pHraw = 1/h/sumRaw;
  var pXraw = hasX ? 1/x/sumRaw : 0;
  var pAraw = 1/a/sumRaw;

  // 2. Marge bookmaker
  var margin = (sumRaw - 1) * 100;

  // 3. Correction Shin (méthode utilisée par les bookmakers pro)
  // Retire la marge proportionnellement pour obtenir les vraies probabilités
  var z = Math.sqrt(margin/100 * (margin/100 + 4*(1 - margin/100) * pHraw * pAraw)) - margin/100;
  z = Math.min(Math.max(z, 0), 0.15);
  
  var pH = (pHraw - z/2) / (1 - z);
  var pX = hasX ? (pXraw - z/2) / (1 - z) : 0;
  var pA = (pAraw - z/2) / (1 - z);

  // Normaliser
  var total = pH + pX + pA;
  pH = pH/total; pX = pX/total; pA = pA/total;

  // 4. Expected Value pour chaque issue
  var evH = pH * (h - 1) - (1 - pH);
  var evX = hasX ? (pX * (x - 1) - (1 - pX)) : -99;
  var evA = pA * (a - 1) - (1 - pA);

  // 5. Modèle Poisson - estimation des buts attendus
  // Basé sur les probabilités implicites
  var lambdaH = estimateLambda(pH, pX, pA, true);
  var lambdaA = estimateLambda(pH, pX, pA, false);

  // 6. Calcul Over/Under 2.5
  var pOver25 = poissonOver(lambdaH, lambdaA, 2.5);
  var pBTTS = (1 - Math.exp(-lambdaH)) * (1 - Math.exp(-lambdaA));

  // 7. Score le plus probable
  var bestScore = mostLikelyScore(lambdaH, lambdaA);

  // 8. Critère de Kelly (gestion bankroll)
  var maxEV = Math.max(evH, evX, evA);
  var bestOdd = evH>=evA&&evH>=evX ? h : (evA>=evX ? a : x);
  var bestP = evH>=evA&&evH>=evX ? pH : (evA>=evX ? pA : pX);
  var kelly = Math.max(0, bestP - (1-bestP)/(bestOdd-1)) * 0.5; // Half-Kelly

  // 9. Déterminer verdict principal
  var verdict, bet, confidence, vboxClass, textClass, reason, risk;

  // Trouver le meilleur EV
  var evs = [{v:'1',ev:evH,p:pH,odd:h},{v:'X',ev:evX,p:pX,odd:x},{v:'2',ev:evA,p:pA,odd:a}];
  if(!hasX) evs = evs.filter(function(e){return e.v!=='X';});
  evs.sort(function(a,b){return b.ev-a.ev;});
  var best = evs[0];

  // Confiance basée sur: EV, marge, écart probabilités
  var pDiff = Math.abs(best.p - 0.33);
  var evBonus = Math.max(0, best.ev * 100);
  var marginBonus = Math.max(0, 8 - margin) * 2;
  confidence = Math.round(50 + pDiff * 120 + evBonus * 0.3 + marginBonus);
  confidence = Math.min(92, Math.max(52, confidence));

  // Ajustement selon la clarté du favori
  if(best.p > 0.65) confidence = Math.min(92, confidence + 10);
  if(best.p > 0.55 && best.p <= 0.65) confidence = Math.min(88, confidence + 5);
  if(margin > 10) confidence = Math.max(52, confidence - 8);

  verdict = best.v;
  risk = confidence >= 75 ? 'FAIBLE' : confidence >= 63 ? 'MOYEN' : 'ELEVE';

  // Générer texte analyse
  if(verdict === '1') {
    vboxClass = 'v1b'; textClass = 'c1';
    bet = m.home + ' — Victoire Domicile';
    var evPct = (evH*100).toFixed(1);
    reason = m.home + ' favori a domicile avec ' + Math.round(pH*100) + '% de probabilite reelle.\n';
    reason += 'EV: ' + (evH>0?'+':'') + evPct + '% — ' + (evH>0?'Value Bet detecte !':'Marche equilibre.') + '\n';
    reason += 'Score le plus probable: ' + bestScore + ' | Over 2.5: ' + Math.round(pOver25*100) + '%';
  } else if(verdict === '2') {
    vboxClass = 'v2b'; textClass = 'c2';
    bet = m.away + ' — Victoire Exterieur';
    var evPct = (evA*100).toFixed(1);
    reason = m.away + ' favori en deplacement avec ' + Math.round(pA*100) + '% de probabilite reelle.\n';
    reason += 'EV: ' + (evA>0?'+':'') + evPct + '% — ' + (evA>0?'Value Bet detecte !':'Marche standard.') + '\n';
    reason += 'Score le plus probable: ' + bestScore + ' | Over 2.5: ' + Math.round(pOver25*100) + '%';
  } else {
    vboxClass = 'vxb'; textClass = 'cx';
    bet = 'Match Nul — Equilibre';
    reason = 'Match tres equilibre: Dom.' + Math.round(pH*100) + '% Nul' + Math.round(pX*100) + '% Ext.' + Math.round(pA*100) + '%.\n';
    reason += 'Marge bookmaker ' + margin.toFixed(1) + '% — ' + (margin<6?'Excellent marche.':'Marche correct.') + '\n';
    reason += 'Score le plus probable: ' + bestScore + ' | BTTS: ' + Math.round(pBTTS*100) + '%';
  }

  // Bonus Over/Under si signal fort
  var overVerdict = null;
  if(pOver25 > 0.62 && Math.abs(evH - evA) < 0.05) {
    overVerdict = {verdict:'OVER', bet:'Over 2.5 buts', confidence: Math.round(pOver25*100), 
      reason:'Les deux equipes offensives — ' + Math.round(pOver25*100) + '% de chance Over 2.5. Buts attendus: ' + lambdaH.toFixed(1) + ' + ' + lambdaA.toFixed(1) + ' = ' + (lambdaH+lambdaA).toFixed(1)};
  } else if(pOver25 < 0.35) {
    overVerdict = {verdict:'UNDER', bet:'Under 2.5 buts', confidence: Math.round((1-pOver25)*100),
      reason:'Match defensif attendu — ' + Math.round((1-pOver25)*100) + '% de chance Under 2.5. Buts attendus: ' + lambdaH.toFixed(1) + ' + ' + lambdaA.toFixed(1) + ' = ' + (lambdaH+lambdaA).toFixed(1)};
  }

  return {
    verdict: verdict,
    bet: bet,
    confidence: confidence,
    probH: Math.round(pH*100),
    probX: Math.round(pX*100),
    probA: Math.round(pA*100),
    reason: reason,
    risk: risk,
    margin: margin.toFixed(1),
    evH: evH,
    evX: evX,
    evA: evA,
    kelly: (kelly*100).toFixed(1),
    pOver25: Math.round(pOver25*100),
    pBTTS: Math.round(pBTTS*100),
    bestScore: bestScore,
    lambdaH: lambdaH.toFixed(1),
    lambdaA: lambdaA.toFixed(1),
    vboxClass: vboxClass,
    textClass: textClass,
    isValue: best.ev > 0.03,
    overVerdict: overVerdict
  };
}

// Estimation lambda Poisson depuis les probabilités
function estimateLambda(pH, pX, pA, isHome) {
  // Basé sur la relation statistique entre probabilités et buts
  var totalGoals = -Math.log(pX + 0.01) * 1.8;
  totalGoals = Math.max(1.0, Math.min(4.5, totalGoals));
  
  var homeAdvantage = 0.15;
  if(isHome) {
    return totalGoals * (0.5 + homeAdvantage + (pH - 0.33) * 0.4);
  } else {
    return totalGoals * (0.5 - homeAdvantage + (pA - 0.33) * 0.4);
  }
}

// Distribution de Poisson
function poissonPMF(k, lambda) {
  var result = Math.exp(-lambda);
  for(var i=1; i<=k; i++) result *= lambda/i;
  return result;
}

// Probabilité Over X buts
function poissonOver(lH, lA, threshold) {
  var pUnder = 0;
  var maxGoals = Math.ceil(threshold) + 1;
  for(var i=0; i<=maxGoals; i++) {
    for(var j=0; j<=maxGoals; j++) {
      if(i+j <= threshold) {
        pUnder += poissonPMF(i, lH) * poissonPMF(j, lA);
      }
    }
  }
  return Math.max(0.15, Math.min(0.85, 1 - pUnder));
}

// Score le plus probable
function mostLikelyScore(lH, lA) {
  var bestP = 0, bestI = 0, bestJ = 0;
  for(var i=0; i<=5; i++) {
    for(var j=0; j<=5; j++) {
      var p = poissonPMF(i,lH)*poissonPMF(j,lA);
      if(p > bestP) { bestP=p; bestI=i; bestJ=j; }
    }
  }
  return bestI+'-'+bestJ;
}

// ═══════════════════════════════════════
// CHARGEMENT API
// ═══════════════════════════════════════
async function start(){
  var key=document.getElementById('ok').value.trim();
  if(!key){ss('Entre ta cle The Odds API !');return;}
  var sel=Array.from(document.getElementById('lg').selectedOptions).map(function(o){return o.value;});
  if(!sel.length){ss('Selectionne au moins une ligue !');return;}
  document.getElementById('bg').disabled=true;
  M=[];
  ss('Chargement des matchs 48h...',true);
  for(var i=0;i<sel.length;i++){
    try{
      var r=await fetch('https://api.the-odds-api.com/v4/sports/'+sel[i]+'/odds/?apiKey='+key+'&regions=eu,uk&markets=h2h&oddsFormat=decimal&dateFormat=iso');
      if(r.status===401){ss('Cle API invalide — verifie sur the-odds-api.com');document.getElementById('bg').disabled=false;return;}
      if(!r.ok) continue;
      var d=await r.json();
      if(!Array.isArray(d)) continue;
      var now=new Date(), h48=new Date(now.getTime()+48*3600000);
      d.filter(function(m){var t=new Date(m.commence_time);return t>=now&&t<=h48;})
       .forEach(function(m){M.push(proc(m,sel[i]));});
    }catch(e){}
  }
  if(!M.length){ss('Aucun match 48h pour ces ligues. Essaie la demo !');document.getElementById('bg').disabled=false;return;}
  analyzeAllLocal();
  document.getElementById('bg').disabled=false;
}

function proc(m,sport){
  var bh=null,bx=null,ba=null;
  if(m.bookmakers) m.bookmakers.forEach(function(bk){
    var h2h=null;
    if(bk.markets) bk.markets.forEach(function(mk){if(mk.key==='h2h') h2h=mk;});
    if(h2h&&h2h.outcomes) h2h.outcomes.forEach(function(o){
      if(o.name===m.home_team&&(!bh||o.price>bh)) bh=o.price;
      if(o.name==='Draw'&&(!bx||o.price>bx)) bx=o.price;
      if(o.name===m.away_team&&(!ba||o.price>ba)) ba=o.price;
    });
  });
  return{id:m.id,home:m.home_team,away:m.away_team,league:m.sport_title||sport,
    time:new Date(m.commence_time),odds:{h:bh,x:bx,a:ba},analyzed:false,result:null};
}

function analyzeAllLocal(){
  var hi=0,tot=0;
  for(var i=0;i<M.length;i++){
    var m=M[i];
    if(m.odds.h && m.odds.a){
      m.result = predict(m);
      m.analyzed = true;
      if(m.result.confidence>=70) hi++;
      tot+=m.result.confidence;
    }
  }
  showUI();
  document.getElementById('s1').textContent=M.length;
  document.getElementById('s2').textContent=M.filter(function(m){return m.analyzed;}).length;
  document.getElementById('s3').textContent=hi;
  document.getElementById('s4').textContent=M.length?Math.round(tot/M.length)+'%':'0%';
  renderList();
  var vals=M.filter(function(m){return m.result&&m.result.isValue;}).length;
  ss('✅ '+M.length+' matchs analyses — '+hi+' confiance 70%+ — '+vals+' value bets');
}

function showUI(){
  document.getElementById('sr').style.display='grid';
  document.getElementById('tabs').style.display='flex';
}

// ═══════════════════════════════════════
// RENDU
// ═══════════════════════════════════════
function renderList(){
  var filtered=M;
  if(CF==='high') filtered=M.filter(function(m){return m.result&&m.result.confidence>=70;});
  else if(CF==='v1') filtered=M.filter(function(m){return m.result&&m.result.verdict==='1';});
  else if(CF==='v2') filtered=M.filter(function(m){return m.result&&m.result.verdict==='2';});
  else if(CF==='vx') filtered=M.filter(function(m){return m.result&&m.result.verdict==='X';});
  else if(CF==='value') filtered=M.filter(function(m){return m.result&&m.result.isValue;});
  document.getElementById('list').innerHTML=filtered.length
    ?filtered.map(cardHTML).join('')
    :'<div style="text-align:center;padding:30px;color:var(--muted);font-size:0.82rem">Aucun match dans cette categorie</div>';
}

function cardHTML(m){
  var ts=m.time.toLocaleString('fr-FR',{weekday:'short',day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
  var hx=m.odds.x&&m.odds.x>1;
  var r=m.result;
  if(!r) return '';

  var mg=parseFloat(r.margin);
  var mpC=mg<5?'mg':mg<8?'mo':'mb';
  var mpT='<span class="mp '+mpC+'">Marge '+r.margin+'%</span>';
  var valT=r.isValue?'<span class="mp mg">VALUE BET</span>':'';
  var cC={'1':'v1','X':'vx','2':'v2','OVER':'vo','UNDER':'vo'}[r.verdict]||'vx';
  var cc=r.confidence>=75?'var(--green)':r.confidence>=63?'var(--yellow)':'var(--red)';
  var rc=r.risk==='FAIBLE'?'var(--green)':r.risk==='MOYEN'?'var(--yellow)':'var(--red)';

  // EV colors
  var evHc=r.evH>0.03?'var(--green)':r.evH>-0.03?'var(--yellow)':'var(--red)';
  var evXc=r.evX>0.03?'var(--green)':r.evX>-0.03?'var(--yellow)':'var(--red)';
  var evAc=r.evA>0.03?'var(--green)':r.evA>-0.03?'var(--yellow)':'var(--red)';

  var extraSection = r.overVerdict ? 
    '<div style="margin-top:10px;padding:10px;background:rgba(0,229,255,0.06);border:1px solid rgba(0,229,255,0.15);border-radius:8px">'
    +'<div style="font-size:0.65rem;font-weight:700;color:var(--accent);margin-bottom:4px">SIGNAL SUPPLEMENTAIRE</div>'
    +'<div style="font-size:0.78rem;font-weight:700;color:var(--accent)">'+r.overVerdict.bet+' ('+r.overVerdict.confidence+'%)</div>'
    +'<div style="font-size:0.7rem;color:#9ab0c8;margin-top:3px">'+r.overVerdict.reason+'</div>'
    +'</div>' : '';

  return '<div class="mc '+cC+'" id="c-'+m.id+'">'
    +'<div class="mh">'
    +'<div class="ml">'+m.league+' '+mpT+' '+valT+'</div>'
    +'<div class="mr2">'
    +'<div class="mt">'+m.home+'<br><span style="color:var(--muted);font-size:0.75rem">vs</span> '+m.away+'</div>'
    +'<div><div class="mtime">'+ts.slice(-5)+'</div><div class="mdate">'+ts.slice(0,ts.length-6)+'</div></div>'
    +'</div></div>'
    +'<div class="or">'
    +'<div class="oc"><div class="ok2">1</div><div class="ov2'+(r.verdict==='1'?' hl':'')+'">'+m.odds.h.toFixed(2)+'</div></div>'
    +(hx?'<div class="oc"><div class="ok2">X</div><div class="ov2'+(r.verdict==='X'?' hl':'')+'">'+m.odds.x.toFixed(2)+'</div></div>':'')
    +'<div class="oc"><div class="ok2">2</div><div class="ov2'+(r.verdict==='2'?' hl':'')+'">'+m.odds.a.toFixed(2)+'</div></div>'
    +'</div>'
    +'<div class="ap">'
    +'<div class="vbox '+r.vboxClass+'">'
    +'<span style="font-size:1.4rem">'+(r.verdict==='1'||r.verdict==='2'?'✅':r.verdict==='X'?'⚖️':r.verdict==='OVER'?'📈':'📉')+'</span>'
    +'<div><div class="vm '+r.textClass+'">'+r.bet+'</div>'
    +'<div style="font-size:0.62rem;color:var(--muted);margin-top:2px">Risque: <span style="color:'+rc+'">'+r.risk+'</span> | Kelly: '+r.kelly+'%</div>'
    +'</div></div>'
    +'<div class="pg">'
    +'<div class="pc"><div class="pp" style="color:var(--green)">'+r.probH+'%</div><div class="plab">Dom.</div></div>'
    +'<div class="pc"><div class="pp" style="color:var(--yellow)">'+r.probX+'%</div><div class="plab">Nul</div></div>'
    +'<div class="pc"><div class="pp" style="color:var(--red)">'+r.probA+'%</div><div class="plab">Ext.</div></div>'
    +'</div>'
    +'<div class="cr"><span>Confiance</span><span style="font-weight:700;color:'+cc+'">'+r.confidence+'%</span></div>'
    +'<div class="cb"><div class="cf" style="width:'+r.confidence+'%;background:'+cc+'"></div></div>'
    +'<div class="at">'+r.reason+'</div>'
    +'<div class="extra-grid">'
    +'<div class="eg"><div class="eg-label">EV Domicile</div><div class="eg-val" style="color:'+evHc+'">'+(r.evH>0?'+':'')+( r.evH*100).toFixed(1)+'%</div></div>'
    +(hx?'<div class="eg"><div class="eg-label">EV Nul</div><div class="eg-val" style="color:'+evXc+'">'+(r.evX>0?'+':'')+(r.evX*100).toFixed(1)+'%</div></div>':'')
    +'<div class="eg"><div class="eg-label">EV Exterieur</div><div class="eg-val" style="color:'+evAc+'">'+(r.evA>0?'+':'')+(r.evA*100).toFixed(1)+'%</div></div>'
    +'<div class="eg"><div class="eg-label">Score probable</div><div class="eg-val" style="color:var(--accent)">'+r.bestScore+'</div></div>'
    +'<div class="eg"><div class="eg-label">Over 2.5</div><div class="eg-val" style="color:var(--accent)">'+r.pOver25+'%</div></div>'
    +'<div class="eg"><div class="eg-label">BTTS</div><div class="eg-val" style="color:var(--purple)">'+r.pBTTS+'%</div></div>'
    +'</div>'
    +extraSection
    +'</div></div>';
}

function filt(t,el){
  CF=t;
  document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active');});
  el.classList.add('active');
  renderList();
}
