<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ScoutAI — Prédictions 48H</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&display=swap');
:root{--bg:#03050a;--bg2:#080d14;--bg3:#0e1520;--bg4:#141d2b;--border:#1a2535;--accent:#00e5ff;--green:#00e096;--red:#ff3d71;--yellow:#ffaa00;--purple:#9d4edd;--text:#e8f0fe;--muted:#4a6080}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh;padding-bottom:30px}
.header{background:rgba(3,5,10,0.97);border-bottom:1px solid var(--border);padding:14px 16px;position:sticky;top:0;z-index:100}
.hrow{display:flex;justify-content:space-between;align-items:center}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;letter-spacing:3px;background:linear-gradient(135deg,var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.badge{background:rgba(0,229,255,0.12);border:1px solid rgba(0,229,255,0.25);color:var(--accent);font-size:0.6rem;font-weight:700;padding:4px 10px;border-radius:20px}
.main{padding:14px;max-width:600px;margin:0 auto}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px}
.stitle{font-size:0.65rem;font-weight:700;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
label{font-size:0.65rem;font-weight:600;color:var(--muted);letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:5px}
input,select{width:100%;background:var(--bg4);border:1.5px solid var(--border);color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:0.82rem;padding:10px 12px;border-radius:10px;outline:none;margin-bottom:10px}
input:focus,select:focus{border-color:var(--accent)}
.bgo{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),#0099bb);color:#000;border:none;border-radius:12px;font-family:'Space Grotesk',sans-serif;font-size:0.92rem;font-weight:700;cursor:pointer;margin-bottom:8px}
.bgo:disabled{opacity:0.5}
.bdemo{width:100%;padding:11px;background:var(--bg3);border:1.5px solid var(--border);color:var(--text);border-radius:10px;font-family:'Space Grotesk',sans-serif;font-size:0.82rem;font-weight:600;cursor:pointer}
.status{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:0.75rem;margin-bottom:14px;min-height:42px}
.spin{width:15px;height:15px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp 0.7s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.pw{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:14px;display:none}
.pl{font-size:0.72rem;color:var(--muted);margin-bottom:8px;display:flex;justify-content:space-between}
.pb{height:5px;background:var(--bg4);border-radius:3px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--accent),var(--purple));border-radius:3px;transition:width 0.4s;width:0%}
.sr{display:none;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.sb{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center}
.sv{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:1px}
.sl{font-size:0.55rem;color:var(--muted);font-weight:600;text-transform:uppercase;margin-top:2px}
.tabs{display:none;gap:6px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none}
.tab{flex-shrink:0;padding:6px 14px;background:var(--bg3);border:1.5px solid var(--border);border-radius:20px;font-size:0.7rem;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap}
.tab.active{background:rgba(0,229,255,0.1);border-color:var(--accent);color:var(--accent)}
.mc{background:var(--bg2);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden}
.mc.v1{border-left:3px solid var(--green)}
.mc.vx{border-left:3px solid var(--yellow)}
.mc.v2{border-left:3px solid var(--red)}
.mh{padding:13px 14px;cursor:pointer}
.ml{font-size:0.58rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:5px}
.mr{display:flex;justify-content:space-between;align-items:center;gap:8px}
.mt{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:1px;line-height:1.3;flex:1}
.mtime{font-size:0.7rem;color:var(--accent);font-weight:600;text-align:right}
.mdate{font-size:0.6rem;color:var(--muted);text-align:right}
.or{display:flex;border-top:1px solid var(--border)}
.oc{flex:1;padding:7px 4px;text-align:center;border-right:1px solid var(--border)}
.oc:last-child{border-right:none}
.ok{font-size:0.52rem;color:var(--muted);font-weight:700;text-transform:uppercase}
.ov{font-family:'Bebas Neue',sans-serif;font-size:1rem}
.ov.hl{color:var(--green)}
.ap{border-top:1px solid var(--border);padding:13px;display:none}
.ap.open{display:block}
.vb{border-radius:10px;padding:12px;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.v1b{background:rgba(0,224,150,0.1);border:1px solid rgba(0,224,150,0.25)}
.vxb{background:rgba(255,170,0,0.1);border:1px solid rgba(255,170,0,0.25)}
.v2b{background:rgba(255,61,113,0.1);border:1px solid rgba(255,61,113,0.25)}
.vob{background:rgba(0,229,255,0.1);border:1px solid rgba(0,229,255,0.25)}
.vub{background:rgba(157,78,221,0.1);border:1px solid rgba(157,78,221,0.25)}
.vm{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:1px}
.c1{color:var(--green)}.cx{color:var(--yellow)}.c2{color:var(--red)}.co{color:var(--accent)}.cu{color:var(--purple)}
.pg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}
.pc{background:var(--bg3);border-radius:8px;padding:8px 4px;text-align:center}
.pp{font-family:'Bebas Neue',sans-serif;font-size:1rem}
.plb{font-size:0.55rem;color:var(--muted);font-weight:600;text-transform:uppercase;margin-top:1px}
.cr{display:flex;justify-content:space-between;font-size:0.68rem;color:var(--muted);margin-bottom:5px}
.cb{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-bottom:10px}
.cf{height:100%;border-radius:2px;transition:width 1s ease}
.at{font-size:0.77rem;line-height:1.7;color:#9ab0c8}
.sk{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:200%;animation:sh 1.5s infinite;border-radius:6px;height:12px;margin-bottom:7px}
@keyframes sh{0%{background-position:200%}100%{background-position:-200%}}
.mp{font-size:0.58px;padding:2px 6px;border-radius:3px;font-weight:600;font-size:0.58rem}
.mg{background:rgba(0,224,150,0.12);color:var(--green)}
.mo{background:rgba(255,170,0,0.12);color:var(--yellow)}
.mb{background:rgba(255,61,113,0.12);color:var(--red)}
.dots{display:inline-flex;gap:4px;align-items:center}
.dot{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:dp 1.2s infinite}
.dot:nth-child(2){animation-delay:0.2s}.dot:nth-child(3){animation-delay:0.4s}
@keyframes dp{0%,80%,100%{transform:scale(0.6);opacity:0.4}40%{transform:scale(1);opacity:1}}
</style>
</head>
<body>
<div class="header">
  <div class="hrow">
    <div class="logo">ScoutAI</div>
    <div class="badge">PREDICTIONS 48H</div>
  </div>
</div>
<div class="main">
<div class="card" id="setup">
  <div class="stitle">Configuration</div>
  <label>Cle The Odds API (gratuite)</label>
  <input type="text" id="ok" placeholder="the-odds-api.com -> Register -> copie ta cle">
  <label>Ligues (appui long = plusieurs)</label>
  <select id="lg" multiple size="7">
    <option value="soccer_epl" selected>Premier League (Angleterre)</option>
    <option value="soccer_uefa_champs_league" selected>Champions League</option>
    <option value="soccer_europa_league">Europa League</option>
    <option value="soccer_spain_la_liga" selected>La Liga (Espagne)</option>
    <option value="soccer_germany_bundesliga" selected>Bundesliga (Allemagne)</option>
    <option value="soccer_france_ligue_one" selected>Ligue 1 (France)</option>
    <option value="soccer_italy_serie_a">Serie A (Italie)</option>
    <option value="soccer_portugal_primeira_liga">Liga Portugal</option>
    <option value="soccer_turkey_super_league">Super Lig (Turquie)</option>
    <option value="soccer_netherlands_eredivisie">Eredivisie (Pays-Bas)</option>
    <option value="soccer_belgium_first_div">Pro League (Belgique)</option>
    <option value="soccer_brazil_campeonato">Brasileirao</option>
    <option value="soccer_argentina_primera_division">Liga Profesional (Argentine)</option>
    <option value="soccer_mexico_ligamx">Liga MX (Mexique)</option>
    <option value="soccer_usa_mls">MLS (USA)</option>
    <option value="soccer_australia_aleague">A-League (Australie)</option>
    <option value="basketball_nba">NBA</option>
    <option value="americanfootball_nfl">NFL</option>
  </select>
  <button class="bgo" id="bg" onclick="start()">Charger et Analyser les 48H</button>
  <button class="bdemo" onclick="demo()">Demo sans cle API</button>
  <div style="margin-top:10px;padding:10px;background:var(--bg4);border-radius:8px;font-size:0.62rem;color:var(--muted);line-height:1.7">
    Cle gratuite sur the-odds-api.com - Register - 500 requetes par mois gratuites
  </div>
</div>
<div class="status" id="st"><span style="color:var(--muted)">Entre ta cle ou clique Demo pour commencer</span></div>
<div class="pw" id="pw">
  <div class="pl"><span id="pt">Chargement...</span><span id="pp">0%</span></div>
  <div class="pb"><div class="pf" id="pf"></div></div>
</div>
<div class="sr" id="sr">
  <div class="sb"><div class="sv" id="s1" style="color:var(--accent)">0</div><div class="sl">Matchs</div></div>
  <div class="sb"><div class="sv" id="s2" style="color:var(--green)">0</div><div class="sl">Analyses</div></div>
  <div class="sb"><div class="sv" id="s3" style="color:var(--yellow)">0</div><div class="sl">Conf 70+</div></div>
  <div class="sb"><div class="sv" id="s4" style="color:var(--purple)">0%</div><div class="sl">Moyenne</div></div>
</div>
<div class="tabs" id="tabs">
  <div class="tab active" onclick="filt('all',this)">Tous</div>
  <div class="tab" onclick="filt('high',this)">Confiance 70+</div>
  <div class="tab" onclick="filt('v1',this)">Domicile gagne</div>
  <div class="tab" onclick="filt('v2',this)">Exterieur gagne</div>
  <div class="tab" onclick="filt('vx',this)">Match Nul</div>
</div>
<div id="list"></div>
</div>

<script>
var M=[], CF='all';

function ss(msg,load){
  document.getElementById('st').innerHTML=load
    ?'<div class="spin"></div><span>'+msg+'</span>'
    :'<span>'+msg+'</span>';
}

function sp(pct,txt){
  var w=document.getElementById('pw');
  w.style.display='block';
  document.getElementById('pf').style.width=pct+'%';
  document.getElementById('pp').textContent=pct+'%';
  document.getElementById('pt').textContent=txt;
  if(pct>=100) setTimeout(function(){w.style.display='none';},2000);
}

async function start(){
  var key=document.getElementById('ok').value.trim();
  if(!key){ss('Entre ta cle API The Odds API !');return;}
  var sel=Array.from(document.getElementById('lg').selectedOptions).map(function(o){return o.value;});
  if(!sel.length){ss('Selectionne au moins une ligue !');return;}
  document.getElementById('bg').disabled=true;
  M=[];
  ss('Chargement des matchs 48h...',true);
  for(var i=0;i<sel.length;i++){
    var sport=sel[i];
    try{
      var r=await fetch('https://api.the-odds-api.com/v4/sports/'+sport+'/odds/?apiKey='+key+'&regions=eu,uk&markets=h2h&oddsFormat=decimal&dateFormat=iso');
      if(r.status===401){ss('Cle API invalide - verifie sur the-odds-api.com');document.getElementById('bg').disabled=false;return;}
      if(!r.ok) continue;
      var d=await r.json();
      if(!Array.isArray(d)) continue;
      var now=new Date(), h48=new Date(now.getTime()+48*3600000);
      d.filter(function(m){var t=new Date(m.commence_time);return t>=now&&t<=h48;})
       .forEach(function(m){M.push(proc(m,sport));});
    }catch(e){}
  }
  if(!M.length){ss('Aucun match dans les 48h pour ces ligues. Essaie la demo !');document.getElementById('bg').disabled=false;return;}
  showUI();renderList();
  ss(''+M.length+' matchs charges - Analyse IA en cours...',true);
  await analyzeAll();
  document.getElementById('bg').disabled=false;
}

function proc(m,sport){
  var bh=null,bx=null,ba=null;
  if(m.bookmakers) m.bookmakers.forEach(function(bk){
    var h2h=null;
    if(bk.markets) bk.markets.forEach(function(mk){if(mk.key==='h2h') h2h=mk;});
    if(h2h&&h2h.outcomes) h2h.outcomes.forEach(function(o){
      if(o.name===m.home_team&&(!bh||o.price>bh)) bh=o.price;
      if(o.name==='Draw'&&(!bx||o.price>bx)) bx=o.price;
      if(o.name===m.away_team&&(!ba||o.price>ba)) ba=o.price;
    });
  });
  var mg=null;
  if(bh&&ba){var s=1/bh+(bx?1/bx:0)+1/ba;mg=((s-1)*100).toFixed(1);}
  return{id:m.id,home:m.home_team,away:m.away_team,league:m.sport_title||sport,
    time:new Date(m.commence_time),odds:{h:bh,x:bx,a:ba},margin:mg,
    analyzed:false,analyzing:false,result:null};
}

function showUI(){
  document.getElementById('sr').style.display='grid';
  document.getElementById('tabs').style.display='flex';
  document.getElementById('s1').textContent=M.length;
}

async function analyzeAll(){
  var done=0,hi=0,tot=0;
  for(var i=0;i<M.length;i++){
    var m=M[i];
    m.analyzing=true;upd(m);
    sp(Math.round(i/M.length*100),'Analyse '+(i+1)+'/'+M.length+': '+m.home+' vs '+m.away);
    try{m.result=await aiAnalyze(m);}
    catch(e){m.result=statFallback(m);}
    m.analyzed=true;m.analyzing=false;done++;
    if(m.result.confidence>=70) hi++;
    tot+=m.result.confidence;
    document.getElementById('s2').textContent=done;
    document.getElementById('s3').textContent=hi;
    document.getElementById('s4').textContent=Math.round(tot/done)+'%';
    upd(m);
    await sleep(700);
  }
  sp(100,''+M.length+' matchs analyses !');
  ss(''+M.length+' matchs analyses - '+hi+' avec confiance 70%+');
}

async function aiAnalyze(m){
  var hx=m.odds.x&&m.odds.x>1;
  var sum=m.odds.h?(1/m.odds.h+(hx?1/m.odds.x:0)+1/m.odds.a):1;
  var pH=m.odds.h?Math.round(1/m.odds.h/sum*100):33;
  var pX=hx?Math.round(1/m.odds.x/sum*100):34;
  var pA=m.odds.a?Math.round(1/m.odds.a/sum*100):33;
  var dt=m.time.toLocaleString('fr-FR',{weekday:'short',day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});

  var prompt='Analyste bookmaker expert. Analyse ce match et reponds UNIQUEMENT en JSON valide.\n';
  prompt+='Match: '+m.home+' vs '+m.away+' | '+m.league+' | '+dt+'\n';
  prompt+='Cotes: 1='+(m.odds.h||'?')+' X='+(m.odds.x||'N/A')+' 2='+(m.odds.a||'?')+' | Marge: '+(m.margin||'?')+'%\n';
  prompt+='Probabilites implicites: Dom.'+pH+'% Nul'+pX+'% Ext.'+pA+'%\n';
  prompt+='JSON attendu: {"verdict":"1","confidence":75,"probH":52,"probX":28,"probA":20,"bet":"Arsenal Victoire","reason":"Analyse en 2-3 phrases.","risk":"FAIBLE"}\n';
  prompt+='verdict = 1 ou X ou 2 ou OVER ou UNDER | risk = FAIBLE ou MOYEN ou ELEVE';

  var body=JSON.stringify({
    model:'claude-haiku-4-5-20251001',
    max_tokens:300,
    messages:[{role:'user',content:prompt}]
  });

  // Essai direct
  try{
    var r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01'},
      body:body
    });
    if(r.ok){
      var d=await r.json();
      var txt=d.content?d.content.map(function(c){return c.text||'';}).join(''):'';
      var jm=txt.match(/\{[\s\S]*?\}/);
      if(jm){var res=JSON.parse(jm[0]);if(res.verdict&&res.confidence) return res;}
    }
  }catch(e){}

  // Proxy 1
  try{
    var r2=await fetch('https://corsproxy.io/?url='+encodeURIComponent('https://api.anthropic.com/v1/messages'),{
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01'},
      body:body
    });
    if(r2.ok){
      var d2=await r2.json();
      var txt2=d2.content?d2.content.map(function(c){return c.text||'';}).join(''):'';
      var jm2=txt2.match(/\{[\s\S]*?\}/);
      if(jm2){var res2=JSON.parse(jm2[0]);if(res2.verdict&&res2.confidence) return res2;}
    }
  }catch(e){}

  return statFallback(m);
}

function statFallback(m){
  var hx=m.odds.x&&m.odds.x>1;
  var sum=m.odds.h?(1/m.odds.h+(hx?1/m.odds.x:0)+1/m.odds.a):1;
  var pH=m.odds.h?Math.round(1/m.odds.h/sum*100):33;
  var pX=hx?Math.round(1/m.odds.x/sum*100):34;
  var pA=m.odds.a?Math.round(1/m.odds.a/sum*100):33;
  var mg=parseFloat(m.margin||10);
  var verdict,bet,reason,confidence;
  if(pH>=48){
    verdict='1';bet=m.home+' Victoire';
    confidence=Math.min(82,50+Math.round((pH-48)*0.9));
    reason=m.home+' favori a domicile ('+pH+'% probabilite implicite). Marge bookmaker '+mg+'% - '+(mg<6?'marche de qualite':'marche standard')+'. Avantage terrain significatif.';
  }else if(pA>=45){
    verdict='2';bet=m.away+' Victoire';
    confidence=Math.min(78,45+Math.round((pA-45)*0.9));
    reason=m.away+' favori en deplacement ('+pA+'%). Cote a '+(m.odds.a?m.odds.a.toFixed(2):'?')+' represente une bonne valeur selon les probabilites implicites.';
  }else{
    verdict='X';bet='Match equilibre - Nul possible';confidence=57;
    reason='Match tres equilibre Dom.'+pH+'% Nul'+pX+'% Ext.'+pA+'%. Ecart de cotes faible. Prudence recommandee.';
  }
  var risk=confidence>=75?'FAIBLE':confidence>=62?'MOYEN':'ELEVE';
  return{verdict:verdict,confidence:confidence,probH:pH,probX:pX,probA:pA,bet:bet,reason:reason,risk:risk};
}

function renderList(){
  var filtered=M;
  if(CF==='high') filtered=M.filter(function(m){return m.result&&m.result.confidence>=70;});
  else if(CF==='v1') filtered=M.filter(function(m){return m.result&&m.result.verdict==='1';});
  else if(CF==='v2') filtered=M.filter(function(m){return m.result&&m.result.verdict==='2';});
  else if(CF==='vx') filtered=M.filter(function(m){return m.result&&m.result.verdict==='X';});
  document.getElementById('list').innerHTML=filtered.length
    ?filtered.map(cardHTML).join('')
    :'<div style="text-align:center;padding:30px;color:var(--muted);font-size:0.82rem">Aucun match dans cette categorie</div>';
}

function upd(m){var el=document.getElementById('c-'+m.id);if(el) el.outerHTML=cardHTML(m);}

function cardHTML(m){
  var ts=m.time.toLocaleString('fr-FR',{weekday:'short',day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
  var hx=m.odds.x&&m.odds.x>1;
  var mg=m.margin?parseFloat(m.margin):null;
  var mpC=mg===null?'':mg<5?'mg':mg<8?'mo':'mb';
  var mpT=mg!==null?'<span class="mp '+mpC+'">Marge '+m.margin+'%</span>':'';
  var cC=m.result?({'1':'v1','X':'vx','2':'v2'}[m.result.verdict]||''):'';
  var ana='';

  if(m.analyzing){
    ana='<div class="ap open"><div class="sk" style="width:70%"></div><div class="sk"></div><div class="sk" style="width:55%"></div>'
      +'<div style="text-align:center;margin-top:8px;font-size:0.7rem;color:var(--muted)">'
      +'<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div> Analyse IA...</div></div>';
  }else if(m.analyzed&&m.result){
    var r=m.result;
    var vm={'1':['v1b','c1',''],'X':['vxb','cx',''],'2':['v2b','c2',''],'OVER':['vob','co',''],'UNDER':['vub','cu','']};
    var vd=vm[r.verdict]||['vxb','cx',''];
    var vb=vd[0],vc=vd[1],ve=vd[2];
    var cc=r.confidence>=75?'var(--green)':r.confidence>=60?'var(--yellow)':'var(--red)';
    var rc=r.risk==='FAIBLE'?'var(--green)':r.risk==='MOYEN'?'var(--yellow)':'var(--red)';
    ana='<div class="ap open">'
      +'<div class="vb '+vb+'"><span style="font-size:1.4rem">'+ve+'</span>'
      +'<div><div class="vm '+vc+'">'+r.bet+'</div>'
      +'<div style="font-size:0.62rem;color:var(--muted);margin-top:2px">Risque: <span style="color:'+rc+'">'+r.risk+'</span></div></div></div>'
      +'<div class="pg">'
      +'<div class="pc"><div class="pp" style="color:var(--green)">'+r.probH+'%</div><div class="plb">Dom.</div></div>'
      +'<div class="pc"><div class="pp" style="color:var(--yellow)">'+r.probX+'%</div><div class="plb">Nul</div></div>'
      +'<div class="pc"><div class="pp" style="color:var(--red)">'+r.probA+'%</div><div class="plb">Ext.</div></div>'
      +'</div>'
      +'<div class="cr"><span>Confiance IA</span><span style="font-weight:700;color:'+cc+'">'+r.confidence+'%</span></div>'
      +'<div class="cb"><div class="cf" style="width:'+r.confidence+'%;background:'+cc+'"></div></div>'
      +'<div class="at">'+r.reason+'</div></div>';
  }else{
    ana='<div class="ap" id="ap-'+m.id+'">'
      +'<button onclick="analyzeOne(\''+m.id+'\')" style="width:100%;padding:9px;background:rgba(0,229,255,0.08);border:1px solid rgba(0,229,255,0.2);color:var(--accent);border-radius:8px;font-family:\'Space Grotesk\',sans-serif;font-size:0.78rem;font-weight:600;cursor:pointer">'
      +'Analyser ce match</button></div>';
  }

  return '<div class="mc '+cC+'" id="c-'+m.id+'">'
    +'<div class="mh" onclick="toggleAP(\''+m.id+'\')">'
    +'<div class="ml">'+m.league+' '+mpT+'</div>'
    +'<div class="mr">'
    +'<div class="mt">'+m.home+'<br><span style="color:var(--muted);font-size:0.75rem">vs</span> '+m.away+'</div>'
    +'<div><div class="mtime">'+ts.slice(-5)+'</div><div class="mdate">'+ts.slice(0,ts.length-6)+'</div></div>'
    +'</div></div>'
    +'<div class="or">'
    +'<div class="oc"><div class="ok">1</div><div class="ov'+(m.result&&m.result.verdict==='1'?' hl':'')+'">'+( m.odds.h?m.odds.h.toFixed(2):'--')+'</div></div>'
    +(hx?'<div class="oc"><div class="ok">X</div><div class="ov'+(m.result&&m.result.verdict==='X'?' hl':'')+'">'+m.odds.x.toFixed(2)+'</div></div>':'')
    +'<div class="oc"><div class="ok">2</div><div class="ov'+(m.result&&m.result.verdict==='2'?' hl':'')+'">'+( m.odds.a?m.odds.a.toFixed(2):'--')+'</div></div>'
    +'</div>'
    +ana+'</div>';
}

function toggleAP(id){var p=document.getElementById('ap-'+id);if(p) p.classList.toggle('open');}

async function analyzeOne(id){
  var m=M.find(function(x){return x.id===id;});if(!m)return;
  m.analyzing=true;upd(m);
  try{m.result=await aiAnalyze(m);}catch(e){m.result=statFallback(m);}
  m.analyzed=true;m.analyzing=false;upd(m);
}

function filt(t,el){
  CF=t;
  document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active');});
  el.classList.add('active');
  renderList();
}
